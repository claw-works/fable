<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清水镇 - Fable 观察端</title>
  <link rel="stylesheet" href="src/style.css?v=7">
</head>
<body>
  <header>
    <h1>🏘 清水镇</h1>
    <div id="status">
      <div class="menu-dropdown">
        <button id="btn-menu" onclick="document.querySelector('.menu-dropdown').classList.toggle('open')">🎮 游戏 ▾</button>
        <div class="menu-items">
          <a href="#" onclick="document.querySelector('.menu-dropdown').classList.remove('open'); showNewGameDialog(); return false;">🆕 新建游戏</a>
          <a href="#" onclick="document.querySelector('.menu-dropdown').classList.remove('open'); showLoadSaveDialog(); return false;">📂 加载存档</a>
          <a href="#" onclick="document.querySelector('.menu-dropdown').classList.remove('open'); showCurrentInfo(); return false;">ℹ️ 当前信息</a>
        </div>
      </div>
      <div class="control-inline">
      </div>
      <span id="game-time">Day1 08:00</span>
      <span id="tick-count">Tick: 0</span>
      <span id="ws-status" class="disconnected">● 未连接</span>
    </div>
  </header>

  <main id="layout">
    <!-- 左栏：地点 + 角色 -->
    <aside id="col-left">
      <div class="panel">
        <h2>📍 各处动态</h2>
        <div id="location-grid"></div>
      </div>
    </aside>

    <!-- 中栏：事件流（tick 卡片） -->
    <section id="col-center">
      <div class="panel" id="timeline-panel">
        <div class="panel-header">
          <h2 id="timeline-title">📜 事件流</h2>
          <div id="focus-bar" style="display:none">
            <span>聚焦：<strong id="focus-name"></strong></span>
            <button onclick="clearFocus()">✕ 清除</button>
          </div>
        </div>
        <div id="tick-stream"></div>
      </div>
    </section>

    <!-- 右栏：玩家操作 + 玩家日志 -->
    <aside id="col-right">
      <div class="panel" id="player-section">
        <h2>🎭 玩家模式</h2>
        <div id="player-not-joined">
          <button id="btn-join" onclick="showJoinForm()">加入小镇</button>
        </div>
        <div id="join-form" style="display:none">
          <div class="form-row"><label>姓名</label><input id="p-name" value="李逍遥" /></div>
          <div class="form-row"><label>年龄</label><input id="p-age" type="number" value="22" /></div>
          <div class="form-row"><label>职业</label><input id="p-occupation" value="游侠" /></div>
          <div class="form-row"><label>性格</label><input id="p-personality" value="豪爽仗义" /></div>
          <div class="form-row"><label>背景</label><textarea id="p-backstory" rows="2">江湖漂泊的年轻侠客</textarea></div>
          <div class="form-row"><label>起始地点</label><select id="p-location"></select></div>
          <div class="form-actions">
            <button onclick="doJoin()">确认加入</button>
            <button onclick="hideJoinForm()">取消</button>
          </div>
        </div>
        <div id="player-joined" style="display:none">
          <div id="player-info"></div>
          <div class="player-actions">
            <button onclick="showMovePanel()">🚶 移动</button>
            <button onclick="showActPanel()">⚡ 行动</button>
            <button onclick="showConvPicker()">💬 对话</button>
            <button id="btn-leave" onclick="doLeave()">🚪 离开</button>
          </div>
          <div id="move-panel" class="action-sub" style="display:none">
            <select id="move-target"></select>
            <button onclick="submitAction('move')">前往</button>
          </div>
          <div id="act-panel" class="action-sub" style="display:none">
            <input id="act-content" placeholder="描述你的行动…" />
            <button onclick="submitAction('act')">执行</button>
          </div>
          <div id="conv-picker" class="action-sub" style="display:none">
            <select id="conv-target"></select>
            <button onclick="startConversation()">开始对话</button>
          </div>
          <hr style="border-color:#333;margin:0.8rem 0"/>
          <div class="sim-controls">
            <span style="font-size:0.85rem;color:#aaa">推进控制</span>
            <div class="sim-btn-row">
              <button onclick="doSingleTick()" title="单步">⏭ 1步</button>
              <button onclick="doRunN()" title="运行N步">▶ <input id="run-n" type="number" value="6" min="1" max="200" style="width:3rem;text-align:center" onclick="event.stopPropagation()"/>步</button>
              <button onclick="doAutoRun()" title="全自动">⏩ 自动</button>
              <button onclick="doInterrupt()" title="暂停/中断">⏸ 暂停</button>
              <button onclick="doResume()" title="继续">▶ 继续</button>
            </div>
            <div class="sim-btn-row" style="margin-top:0.3rem">
              <button id="btn-autopilot" onclick="toggleAutopilot()" title="AI托管玩家行动">🤖 托管</button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" id="player-log-section" style="display:none">
        <h2>📋 玩家日志</h2>
        <div id="player-log"></div>
      </div>
    </aside>
  </main>

  <!-- 对话 Drawer -->
  <div id="conv-drawer" class="drawer">
    <div class="drawer-header">
      <h3 id="conv-npc-name">对话</h3>
      <button onclick="endConversation()">✕ 结束</button>
    </div>
    <div id="conv-messages"></div>
    <div class="drawer-input">
      <input id="conv-input" placeholder="说点什么…" onkeydown="if(event.key==='Enter')sendConvMessage()" />
      <button onclick="sendConvMessage()">发送</button>
    </div>
  </div>

  <script src="src/main.js?v=8"></script>
</body>
</html>
